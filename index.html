<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="score-board">
            <div class="player-score">
                <h2>Player</h2>
                <p id="playerScore">0</p>
            </div>
            <div class="game-title">
                <h1>PONG</h1>
            </div>
            <div class="computer-score">
                <h2>Computer</h2>
                <p id="computerScore">0</p>
            </div>
        </div>

        <div class="game-board" id="gameBoard">
            <div class="paddle paddle-left" id="playerPaddle"></div>
            <div class="ball" id="ball"></div>
            <div class="paddle paddle-right" id="computerPaddle"></div>
            <div class="net"></div>
        </div>

        <div class="instructions">
            <p><strong>Controls:</strong> Move Mouse or Press Arrow Keys (↑↓) to move left paddle</p>
            <p><strong>Goal:</strong> Bounce the ball past the computer's paddle to score!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
